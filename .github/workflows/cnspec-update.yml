name: Bump cnspec

on:
  repository_dispatch:
    types: [update-cnspec]
  workflow_dispatch:
    inputs:
      version:
        description: "cnspec version"
        required: true
        type: string

jobs:
  bump-cnspec:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check calling user
        if: ${{ github.event_name == 'repository_dispatch' && github.event.sender.login != 'mondoo-tools' }}
        run: |
          echo "This user is not allowed to trigger the workflow"
          exit 1
      - name: Determine Version and Validate
        id: version
        env:
          # Determine which version should be released based on event type
          VERSION: ${{ (github.event_name == 'workflow_dispatch' && inputs.version) || github.event.client_payload.version }}
        run: |
          # Semantic Versioning regex (with optional 'v' prefix)
          if [[ ! "$VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version is not a valid semantic version."
            exit 1
          fi
          echo "Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Use SSH keys for checking out the code
      # https://github.com/peter-evans/create-pull-request/issues/48
      # https://github.com/peter-evans/create-pull-request/blob/main/docs/concepts-guidelines.md#push-using-ssh-deploy-keys
      # tl;dr:
      # The GITHUB_TOKEN is limited when creating PRs from a workflow because of that we use SSH keys for which the
      # limitations do not apply
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ssh-key: ${{ secrets.PACKER_PLUGIN_DEPLOY_KEY_PRIV }}

      - name: Import environment variables from file
        run: cat ".github/env" >> $GITHUB_ENV
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=${{ env.golang-version }}"
          check-latest: true
          cache: false
      - name: Bump cnspec
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MODULE="go.mondoo.com/cnspec/${MAJOR}@${VERSION}"
          # Retry `go get` to tolerate sum.golang.org / proxy.golang.org
          # propagation delay for freshly published tags (seen as 404 on
          # sum.golang.org/lookup/...).
          attempts_made=0
          max_attempts=6
          until go get "${MODULE}"; do
            attempts_made=$((attempts_made + 1))
            if [ $attempts_made -ge $max_attempts ]; then
              echo "go get failed after ${max_attempts} attempts"
              exit 1
            fi
            sleep_seconds=$((attempts_made * 30))
            echo "go get attempt ${attempts_made}/${max_attempts} failed; retrying in ${sleep_seconds}s..."
            sleep $sleep_seconds
          done
          go mod tidy
          echo "$VERSION" > VERSION

      - name: Prepare title and branch name
        id: branch
        run: |
          BRANCH_NAME="version/cnspec_update_${{ steps.version.outputs.version }}"
          COMMIT_MSG="🧹 Bump cnspec to ${{ steps.version.outputs.version }}"
          echo "COMMIT_TITLE=${COMMIT_MSG}" >> $GITHUB_OUTPUT
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_OUTPUT

      - name: Create PR
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          base: main
          labels: dependencies,go
          committer: "Mondoo Tools <tools@mondoo.com>"
          commit-message: ${{ steps.branch.outputs.COMMIT_TITLE }}
          author: "Mondoo Tools <tools@mondoo.com>"
          title: ${{ steps.branch.outputs.COMMIT_TITLE }}
          branch: ${{ steps.branch.outputs.BRANCH_NAME }}
          body-path: .github/pr-body.md

      - name: PR infos
        if: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          echo "Pull Request Number - ${{ steps.cpr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.cpr.outputs.pull-request-url }}"
